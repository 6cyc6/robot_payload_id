[workspace]
authors = ["Nicholas Pfaff <nepfaff@mit.edu>"]
channels = ["conda-forge"]
description = "Identifying object inertial properties using a robot arm"
name = "robot-payload-id"
platforms = ["linux-64"]
requires-pixi = ">=0.55"
version = "0.1.0"

[system-requirements]
libc = { family = "glibc", version = "2.35" }

[tasks]

[activation.env]
PYTHONPATH = "$PIXI_PROJECT_ROOT"
MPLCONFIGDIR = "$PIXI_PROJECT_ROOT/.pixi/matplotlib"

[dependencies]
python = ">=3.10,<3.11"
pip = ">=25.0"
pinocchio = ">=4.0.0,<5"
loguru = ">=0.7.3,<0.8"
casadi = ">=3.7.2,<4"
trimesh = ">=4.12.2,<5"

[pypi-options.dependency-overrides]
drake = "==1.36.0"

[pypi-dependencies]
drake = "==1.36.0"
numpy = ">=2.0.0,<3"
manipulation = ">=2025.2.16,<2026"
iiwa-setup = { git = "https://github.com/nepfaff/iiwa_setup.git" }
tqdm = ">=4.66.1,<5"
hydra-core = ">=1.3.2,<2"
omegaconf = ">=2.3.0,<3"
ipython = ">=8.15.0,<9"
pyyaml = ">=6.0.1,<7"
torch = ">=2.0.1,<3"
pybind11 = ">=2.11.1,<3"
scipy = ">=1.11.4,<2"
wandb = ">=0.17.2,<1"
plotly = ">=5.18.0,<6"
sympy = ">=1.12,<2"
nevergrad = ">=1.0.1,<2"
matplotlib = ">=3.8.2,<4"
nlopt = ">=2.7.1,<3"
open3d = ">=0.19.0,<0.20"
pre-commit = ">=3.4.0,<4"
black = ">=23.9.1,<24"
isort = ">=5.12.0,<6"
ipykernel = ">=6.29.3,<7"
